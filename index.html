<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Simulatore">
<link rel="apple-touch-icon" href="/1.png">
<title>Simulatore Fattura</title>

<style>
:root {
  --primary: #2563eb;
  --bg: #0f172a;
  --card: rgba(255,255,255,0.95);
  --muted: #64748b;
  --success: #16a34a;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, sans-serif;
  background: linear-gradient(160deg, #0f172a, #1e293b);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.app {
  width: 100%;
  max-width: 420px;
  padding: 16px;
}

.card {
  background: var(--card);
  border-radius: 24px;
  padding: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.25);
}

h1 {
  margin: 0 0 10px;
  font-size: 26px;
}

.subtitle {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 20px;
}

.input-wrap {
  position: relative;
  margin-bottom: 16px;
}

.input-wrap span {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
}

input {
  width: 88%;
  height: 56px;
  border-radius: 14px;
  border: 1px solid #ddd;
  padding-left: 34px;
  font-size: 18px;
}

button {
  width: 100%;
  height: 54px;
  border-radius: 14px;
  border: none;
  background: var(--primary);
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

button:active {
  transform: scale(0.98);
}

.result {
  margin-top: 20px;
  display: none;
}

.netto {
  background: rgba(22,163,74,0.1);
  padding: 16px;
  border-radius: 16px;
  text-align: center;
  margin-bottom: 12px;
}

.netto strong {
  font-size: 28px;
  color: var(--success);
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.item {
  background: #f8fafc;
  padding: 12px;
  border-radius: 12px;
  font-size: 14px;
}

.item strong {
  display: block;
  margin-top: 4px;
}

@media(max-width:380px){
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>

</head>
<body>

<div class="app">
  <div class="card">

    <h1>💰 Simulatore</h1>
    <div class="subtitle">Calcola netto, imposte e contributi</div>

    <div class="input-wrap">
      <span>€</span>
      <input id="fattura" type="number" placeholder="Es. 1500" />
    </div>

    <button onclick="calcola()">Calcola</button>

    <div id="result" class="result">

      <div class="netto">
        Netto
        <strong id="netto">€ 0</strong>
      </div>

      <div class="grid">
        <div class="item">
          Imposte
          <strong id="imposte"></strong>
        </div>

        <div class="item">
          Contributi
          <strong id="contributi"></strong>
        </div>

        <div class="item">
          Imponibile
          <strong id="imponibile"></strong>
        </div>

        <div class="item">
          Lordo
          <strong id="lordo"></strong>
        </div>
      </div>

    </div>

  </div>
</div>

<script>
function euro(v){
  return new Intl.NumberFormat("it-IT",{style:"currency",currency:"EUR"}).format(v);
}

function calcola(){
  let f = parseFloat(document.getElementById("fattura").value);

  if(!f || f<=0){
    alert("Inserisci un importo valido");
    return;
  }

  let imponibile = f*0.78;
  let imposte = imponibile*0.05;
  let contributi = imponibile*0.2607;
  let netto = f-imposte-contributi;

  document.getElementById("lordo").innerText = euro(f);
  document.getElementById("imponibile").innerText = euro(imponibile);
  document.getElementById("imposte").innerText = euro(imposte);
  document.getElementById("contributi").innerText = euro(contributi);
  document.getElementById("netto").innerText = euro(netto);

  document.getElementById("result").style.display = "block";
}
</script>

</body>
</html>
